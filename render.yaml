services:
  - type: web
    name: square-terminal
    env: node
    buildCommand: npm install
    startCommand: npm start
    disk:
      name: terminal-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: SQUARE_ACCESS_TOKEN
        sync: false
      - key: SQUARE_APPLICATION_ID
        sync: false
      - key: SQUARE_LOCATION_ID
        sync: false
      - key: SQUARE_ENVIRONMENT
        value: production
      - key: DB_PATH
        value: /opt/render/project/src/data/terminal.db
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
